<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell" aria-label="Calculator app">
    <section class="calculator" aria-label="Basic calculator">
      <div class="brand-row">
        <div>
          <p class="eyebrow">Smart Calculator</p>
          <h1>Calculator</h1>
        </div>
        <div class="status-dot" aria-hidden="true"></div>
      </div>

      <div class="display" aria-live="polite">
        <div class="expression" id="expression">Ready</div>
        <div class="result" id="result">0</div>
      </div>

      <div class="keypad">
        <button class="key utility" data-action="clear">AC</button>
        <button class="key utility" data-action="delete">DEL</button>
        <button class="key utility" data-action="percent">%</button>
        <button class="key operator" data-value="/">÷</button>

        <button class="key" data-value="7">7</button>
        <button class="key" data-value="8">8</button>
        <button class="key" data-value="9">9</button>
        <button class="key operator" data-value="*">×</button>

        <button class="key" data-value="4">4</button>
        <button class="key" data-value="5">5</button>
        <button class="key" data-value="6">6</button>
        <button class="key operator" data-value="-">−</button>

        <button class="key" data-value="1">1</button>
        <button class="key" data-value="2">2</button>
        <button class="key" data-value="3">3</button>
        <button class="key operator" data-value="+">+</button>

        <button class="key zero" data-value="0">0</button>
        <button class="key" data-value=".">.</button>
        <button class="key equals" data-action="calculate">=</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
